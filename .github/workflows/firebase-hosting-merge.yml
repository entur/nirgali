name: Build and deploy
on:
  push:
    branches: [ master ]

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.18.0
      - name: Cache node modules
        id: cache-npm
        uses: actions/cache@v6.0.0
        env:
          cache-name: cache-node-modules
        with:
          # npm cache files are stored in `~/.npm` on Linux/macOS
          path: ~/.npm
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-
      - if: ${{ steps.cache-npm.outputs.cache-hit == 'false' }}
        name: List the state of node modules
        continue-on-error: true
        run: npm list
      - run: npm ci
      - run: npm run check
      - run: npm run test:coverage
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.ENTUR_SONAR_PASSWORD }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.organization=enturas-github
            -Dsonar.projectKey=entur_nirgali
            -Dsonar.sources=src
            -Dsonar.tests=src
            -Dsonar.test.inclusions=**/*.test.js
            -Dsonar.coverage.exclusions=**/*.test.js
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
      - run: npm run build
        env:
          REACT_APP_VERSION: ${{ github.sha }}
      - name: Archive production artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: build
          path: |
            build

  prepare_dev:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Download build artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: build
          path: build
      - name: Copy favicon
        run: cp .github/environments/avv-d.ico build/favicon.ico
      - name: Copy config
        run: cp .github/environments/config-dev.json build/config.json
      - name: Archive dev artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: build-dev
          path: |
            build

  deploy_dev:
    needs: [prepare_dev]
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    uses: entur/gha-firebase/.github/workflows/firebase-hosting-deploy.yml@v1
    with:
      gcp_project_id: ent-nirgali-dev
      environment: dev
      build_artifact_name: build-dev
      build_artifact_path: build

  prepare_staging:
    runs-on: ubuntu-latest
    needs: [deploy_dev]
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Download build artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: build
          path: build
      - name: Copy favicon
        run: cp .github/environments/avv-s.ico build/favicon.ico
      - name: Copy config
        run: cp .github/environments/config-staging.json build/config.json
      - name: Archive staging artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: build-staging
          path: |
            build

  deploy_staging:
    needs: [prepare_staging]
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    uses: entur/gha-firebase/.github/workflows/firebase-hosting-deploy.yml@v1
    with:
      gcp_project_id: ent-nirgali-tst
      environment: tst
      build_artifact_name: build-staging
      build_artifact_path: build

  prepare_prod:
    runs-on: ubuntu-latest
    needs: [deploy_staging]
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Download build artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: build
          path: build
      - name: Copy favicon
        run: cp .github/environments/avv-p.ico build/favicon.ico
      - name: Copy config
        run: cp .github/environments/config-prod.json build/config.json
      - name: Archive prod artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: build-prod
          path: |
            build

  deploy_prod:
    needs: [prepare_prod]
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    uses: entur/gha-firebase/.github/workflows/firebase-hosting-deploy.yml@v1
    with:
      gcp_project_id: ent-nirgali-prd
      environment: prd
      build_artifact_name: build-prod
      build_artifact_path: build
